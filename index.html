<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>gpw - Password Generator</title>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then((registration) => {
          console.log('service worker installed');
          return registration.unregister()
            .then(()=> {
              console.log('service worker unregistered.');
            });
        })
        .catch(err => console.error('Error', err));
    }
  </script>
  <link rel="manifest" href="manifest.json">
</head>
<body>
<style>
  * {
    /*outline: 1px blue solid;*/
  }

  body {
    margin: 0;
  }

  header {
    display: flex;
    justify-content: space-between;
  }

  header h1 {
    margin-inline-start: 0.5rem;
  }

  header a {
    display: flex;
    transform: translate(5%, -5%);
    width: fit-content;
    height: fit-content;
  }

  header a img {
    max-width: 30dvw;
  }

  table {
    margin: auto;
  }

  #rules {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>

<header>

<h1>gpw - Password Generator</h1>

<a href="https://github.com/beenotung/gpw">
  <img
       src="https://raw.githubusercontent.com/usecue/fork-me-on-github-svg-ribbons/d01e7778ad1f8795d7e4cc536672af03803962db/images/forkme_right_darkblue_121621.svg"
       alt="Fork me on GitHub"
       data-canonical-src="https://s3.amazonaws.com/github/ribbons/forkme_right_darkblue_121621.png"></a>

</header>

<div id="not_supported">
  <p>Loading Javascript file...</p>
  <p>If you still see this message after a while, probably because your browser is not supported.</p>
  <p>You may update it to the latest version of Firefox or Chrome.</p>
</div>

<!-- input elements -->
<table style="display: none">
  <tr>
    <td><label for="url">Url</label></td>
    <td><input id="url"></td>
  </tr>
  <tr>
    <td><label for="domain">Domain</label></td>
    <td><input id="domain" placeholder="auto generate from url"></td>
  </tr>
  <tr>
    <td><label for="seed">Seed</label></td>
    <td><input id="seed" type="password" placeholder="secret master key"
               autocomplete="off" autocorrect="off" spellcheck="false">
    </td>
  </tr>
  <tr>
    <td><label for="sequence">Sequence</label></td>
    <td><input id="sequence" type="number" placeholder="1"></td>
  </tr>
  <tr>
    <td><label for="method">Method</label></td>
    <td>
      <select id="method" style="width: 100%">
        <option>md5</option>
        <option selected>sha256</option>
        <option>digits</option>
      </select>
    </td>
  </tr>
  <tr>
    <td><label for="length">Length</label></td>
    <td><input id="length" type="number" placeholder="for generated password"></td>
  </tr>
  <tr>
    <td>Rules</td>
    <td>
      <ul id="rules" >
        <li>
          <label for="uppercase">Uppercase</label>
          <input type="checkbox" id="uppercase">
        </li>
        <li>
          <label for="symbols">Symbols</label>
          <input type="checkbox" id="symbols">
        </li>
      </ul>
    </td>
  </tr>
  <tr>
    <td colspan="2" align="center">
      <button id="gpw">Generate Password</button>
    </td>
  </tr>
  <tr>
    <td><label for="password">Password</label></td>
    <td><input id="password"/></td>
  </tr>
  <tr>
    <td colspan="2" align="center">
      <button id="btnToClip">Copy to Clipboard</button>
    </td>
  </tr>
  <tr>
    <td colspan="2" align="center"><span id="msg" style="color: gray">not copied in clipboard</span></td>
  </tr>
  <tr></tr>
  <tr>
    <td colspan="2" align="center">
      <button id="genQRcode">Generate QR code</button>
    </td>
  </tr>
  <tr>
    <td colspan="2" align="center">
      <canvas id="qrcode" width="128" height="128"></canvas>
    </td>
  </tr>
</table>

<script src="index.js"></script>
</body>
</html>
